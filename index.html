<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVS Logistics - Fleet Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a365d;
            --secondary-color: #2b6cb0;
            --accent-color: #ed8936;
            --bg-color: #f7fafc;
            --card-bg: #ffffff;
            --text-main: #2d3748;
            --text-muted: #718096;
            --border-color: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-main);
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 40px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
        }

        .company-name {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header-subtitle {
            font-weight: 300;
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .container { 
            max-width: 1000px; 
            margin: 0 auto; 
            padding: 0 20px 80px; 
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
        }

        h2, h3 { 
            color: var(--primary-color); 
            margin-bottom: 20px;
            font-weight: 700;
        }

        .btn { 
            padding: 12px 24px; 
            border-radius: 8px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            cursor: pointer; 
            transition: all 0.2s ease;
            border: none;
            display: inline-block;
        }

        .btn-primary { 
            background-color: var(--secondary-color); 
            color: white; 
        }
        .btn-primary:hover { background-color: var(--primary-color); transform: translateY(-1px); }

        .btn-accent { 
            background-color: var(--accent-color); 
            color: white; 
            margin: 5px;
        }
        .btn-accent:hover { opacity: 0.9; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            margin: 5px;
        }
        .btn-outline:hover { background: var(--bg-color); }

        .btn-danger {
            background-color: #e53e3e;
            color: white;
            margin: 5px;
        }

        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid var(--border-color); 
            border-radius: 8px;
            margin-bottom: 15px;
            font-family: inherit;
        }

        input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.2);
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .party-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .party-item:last-child { border-bottom: none; }

        .balance-badge {
            background: #ebf8ff;
            color: #2b6cb0;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .total-balance-card {
            background: linear-gradient(135deg, #2d3748, #1a202c);
            color: white;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
            margin-bottom: 30px;
        }

        .total-balance-amount {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--accent-color);
        }

        .footer {
            background: #2d3748;
            color: white;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9rem;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .footer strong {
            color: var(--accent-color);
            font-weight: 600;
        }

        #login-section {
            max-width: 400px;
            margin: 100px auto;
            text-align: center;
        }

        .trip-item {
            padding: 15px;
            background: var(--bg-color); 
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--secondary-color);
        }
    </style>
</head>
<body onload="checkLogin()">
    <div id="login-section" class="card">
        <h1>Welcome Back</h1>
        <p style="margin-bottom: 20px; color: var(--text-muted);">Please login to access AVS Logistics</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn btn-primary" style="width: 100%;" onclick="login()">Login</button>
    </div>

    <div id="app-section" style="display: none;">
        <header class="header">
            <div class="company-name">A V S LOGISTICS PVT. LTD.</div>
            <div class="header-subtitle">Premium Fleet Management System</div>
            <button id="logout-button" class="btn btn-outline" onclick="logout()" style="position: absolute; top: 20px; right: 20px; color: white; border-color: rgba(255,255,255,0.3);">Logout</button>
        </header>

        <div class="container">
            <div id="add-party-section" class="card">
                <button class="btn btn-primary" onclick="showAddPartyForm()">+ Add New Party</button>
                <form id="add-party-form" style="display: none; margin-top: 20px;">
                    <h3>New Party Registration</h3>
                    <label for="party-name">Party Name</label>
                    <input type="text" id="party-name" name="party-name" placeholder="Enter company name">
                    <label for="party-contact">Contact Details</label>
                    <input type="text" id="party-contact" name="party-contact" placeholder="Phone or Email">
                    <button type="button" class="btn btn-primary" onclick="saveParty()">Save Party</button>
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('add-party-form').style.display='none'">Cancel</button>
                </form>
            </div>

            <div id="dashboard-section">
                <div class="total-balance-card">
                    <div style="text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px; opacity: 0.8; margin-bottom: 5px;">Total Outstanding Balance</div>
                    <div class="total-balance-amount">₹ <span id="total-balance">0.00</span></div>
                </div>

                <div class="card">
                    <h2>Active Parties</h2>
                    <div id="party-list">
                        <!-- Party details will be displayed here -->
                    </div>
                </div>
            </div>

            <div id="party-details-section" class="card" style="display: none;">
                <h2 id="party-details-name"></h2>
                
                <div id="trip-list-container" class="card" style="background: var(--bg-color); border: none;">
                    <h3>Trip Records</h3>
                    <div id="trip-list">
                        <!-- Trip details will be displayed here -->
                    </div>
                </div>

                <form id="add-trip-form" class="card" style="display: none; border-style: dashed;">
                    <h3>Add New Trip</h3>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label for="vehicle-no">Vehicle No</label>
                            <input type="text" id="vehicle-no" name="vehicle-no">
                        </div>
                        <div>
                            <label for="trip-party-name">Party Name</label>
                            <input type="text" id="trip-party-name" name="trip-party-name" disabled>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label for="weight">Weight of Freight</label>
                            <input type="text" id="weight" name="weight">
                        </div>
                        <div>
                            <label for="freight-amount">Freight Amount</label>
                            <input type="text" id="freight-amount" name="freight-amount">
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div>
                            <label for="opening-balance">Opening Balance</label>
                            <input type="text" id="opening-balance" name="opening-balance">
                        </div>
                        <div>
                            <label for="advance-payment">Advance Payment</label>
                            <input type="text" id="advance-payment" name="advance-payment">
                        </div>
                    </div>
                    <button type="button" class="btn btn-primary" onclick="saveTrip()">Save Trip</button>
                    <button type="button" class="btn btn-outline" onclick="document.getElementById('add-trip-form').style.display='none'">Cancel</button>
                </form>

                <div id="party-actions" style="margin-top: 20px;">
                    <!-- Back button will be appended here -->
                </div>
            </div>
        </div>

        <div id="add-payment-form" class="card" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1000; width: 90%; max-width: 400px;">
            <h3>Record Payment</h3>
            <label for="payment-amount">Payment Amount</label>
            <input type="number" id="payment-amount" placeholder="Enter amount received">
            <button class="btn btn-primary" id="save-payment-btn" style="width: 100%; margin-bottom: 10px;">Confirm Payment</button>
            <button class="btn btn-outline" style="width: 100%;" onclick="document.getElementById('add-payment-form').style.display='none'">Cancel</button>
        </div>

        <footer class="footer">
            &copy; 2026 <strong>AVS LOGISTICS PVT. LTD.</strong> | site by -<strong>NITISH KUMAR</strong>
        </footer>
    </div>
    <script>
        const API_URL = 'https://avs-backend-9gcl.onrender.com/api';

        function showAddPartyForm() {
            document.getElementById('add-party-form').style.display = 'block';
        }

        async function saveParty() {
            const partyName = document.getElementById('party-name').value;
            const partyContact = document.getElementById('party-contact').value;

            if (partyName && partyContact) {
                const party = { name: partyName, contact: partyContact };
                try {
                    const response = await fetch(`${API_URL}/parties`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(party)
                    });
                    if (response.ok) {
                        document.getElementById('add-party-form').style.display = 'none';
                        document.getElementById('party-name').value = '';
                        document.getElementById('party-contact').value = '';
                        displayParties();
                    } else {
                        alert('Error saving party');
                    }
                } catch (error) {
                    console.error('Error saving party:', error);
                    alert('Error saving party. Check if backend is running.');
                }
            } else {
                alert('Please fill in all fields.');
            }
        }

        function calculateBalance(party) {
            let balance = 0;
            if (party.trips) {
                party.trips.forEach(trip => {
                    balance += parseFloat(trip.freightAmount) || 0;
                    balance -= parseFloat(trip.advancePayment) || 0;
                });
            }
            if (party.payments) {
                party.payments.forEach(payment => {
                    balance -= parseFloat(payment.amount) || 0;
                });
            }
            return balance;
        }

        async function displayParties() {
            const partyList = document.getElementById('party-list');
            partyList.innerHTML = '';
            try {
                const response = await fetch(`${API_URL}/parties`);
                if (response.ok) {
                    const parties = await response.json();
                    let totalBalance = 0;

                    parties.forEach((party, index) => {
                        const balance = calculateBalance(party);
                        totalBalance += balance;
                        const partyDiv = document.createElement('div');
                        partyDiv.className = 'party-item';
                        partyDiv.innerHTML = `
                            <div>
                                <div style="font-weight: 700; font-size: 1.1rem;">${party.name}</div>
                                <div style="color: var(--text-muted); font-size: 0.85rem;">${party.contact}</div>
                            </div>
                            <div style="text-align: right;">
                                <div class="balance-badge">₹ ${balance.toFixed(2)}</div>
                                <div style="margin-top: 10px;">
                                    <button class="btn btn-outline" style="padding: 6px 12px; font-size: 0.7rem;" onclick="viewParty(${index})">Details</button>
                                    <button class="btn btn-accent" style="padding: 6px 12px; font-size: 0.7rem;" onclick="viewPartyAndAddTrip(${index})">Add Trip</button>
                                    <button class="btn btn-primary" style="padding: 6px 12px; font-size: 0.7rem;" onclick="showAddPaymentForm(${index})">Payment</button>
                                    <button class="btn btn-danger" style="padding: 6px 12px; font-size: 0.7rem;" onclick="deleteParty(${index})">Delete</button>
                                </div>
                            </div>
                        `;
                        partyList.appendChild(partyDiv);
                    });

                    document.getElementById('total-balance').innerText = totalBalance.toFixed(2);
                } else {
                    console.error('Error fetching parties');
                }
            } catch (error) {
                console.error('Error fetching parties:', error);
            }
        }

        async function viewParty(partyIndex) {
            try {
                const response = await fetch(`${API_URL}/parties`);
                if (response.ok) {
                    const parties = await response.json();
                    const party = parties[partyIndex];

                    document.getElementById('dashboard-section').style.display = 'none';
                    document.getElementById('add-party-section').style.display = 'none';
                    document.getElementById('party-details-section').style.display = 'block';
                    document.getElementById('party-details-name').innerText = party.name;

                    const tripListContainer = document.getElementById('trip-list');
                    tripListContainer.innerHTML = ''; 

                    displayTrips(partyIndex);

                    const partyActions = document.getElementById('party-actions');
                    partyActions.innerHTML = '';

                    const addTripBtn = document.createElement('button');
                    addTripBtn.className = 'btn btn-accent';
                    addTripBtn.innerText = '+ Add New Trip';
                    addTripBtn.onclick = () => showAddTripForm(partyIndex);
                    partyActions.appendChild(addTripBtn);

                    const backButton = document.createElement('button');
                    backButton.className = 'btn btn-outline';
                    backButton.innerText = '← Back to Dashboard';
                    backButton.onclick = () => {
                        document.getElementById('dashboard-section').style.display = 'block';
                        document.getElementById('add-party-section').style.display = 'block';
                        document.getElementById('party-details-section').style.display = 'none';
                    };
                    partyActions.appendChild(backButton);
                }
            } catch (error) {
                console.error('Error viewing party:', error);
            }
        }

        async function showAddTripForm(partyIndex) {
            document.getElementById('add-trip-form').style.display = 'block';
            document.getElementById('add-trip-form').scrollIntoView({ behavior: 'smooth' });
            try {
                const response = await fetch(`${API_URL}/parties`);
                if (response.ok) {
                    const parties = await response.json();
                    const party = parties[partyIndex];
                    document.getElementById('trip-party-name').value = party.name;
                    // Pass the partyIndex to the saveTrip function
                    document.querySelector('#add-trip-form button.btn-primary').setAttribute('onclick', `saveTrip(${partyIndex})`);
                }
            } catch (error) {
                console.error('Error showing trip form:', error);
            }
        }

        function viewPartyAndAddTrip(partyIndex) {
            viewParty(partyIndex);
            setTimeout(() => showAddTripForm(partyIndex), 100);
        }

        async function displayTrips(partyIndex) {
            const tripList = document.getElementById('trip-list');
            tripList.innerHTML = '';
            try {
                const response = await fetch(`${API_URL}/parties`);
                if (response.ok) {
                    const parties = await response.json();
                    const party = parties[partyIndex];

                    if (party && party.trips && party.trips.length > 0) {
                        party.trips.forEach(trip => {
                            const tripDiv = document.createElement('div');
                            tripDiv.className = 'trip-item';
                            tripDiv.innerHTML = `
                                <div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                                    <span style="font-weight: 600; color: var(--secondary-color);">${trip.vehicleNo}</span>
                                    <span style="font-size: 0.75rem; color: var(--text-muted);">${trip.createdAt}</span>
                                </div>
                                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.85rem;">
                                    <div><strong>Weight:</strong> ${trip.weight}</div>
                                    <div><strong>Freight:</strong> ₹ ${trip.freightAmount}</div>
                                    <div><strong>Opening:</strong> ₹ ${trip.openingBalance}</div>
                                    <div><strong>Advance:</strong> ₹ ${trip.advancePayment}</div>
                                </div>
                            `;
                            tripList.appendChild(tripDiv);
                        });
                    } else {
                        tripList.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">No trips recorded yet.</p>';
                    }
                }
            } catch (error) {
                console.error('Error displaying trips:', error);
            }
        }

        async function saveTrip(partyIndex) {
            const vehicleNo = document.getElementById('vehicle-no').value;
            const weight = document.getElementById('weight').value;
            const freightAmount = document.getElementById('freight-amount').value;
            const openingBalance = document.getElementById('opening-balance').value;
            const advancePayment = document.getElementById('advance-payment').value;

            if (vehicleNo && weight && freightAmount && openingBalance && advancePayment) {
                const trip = { 
                    vehicleNo, 
                    weight, 
                    freightAmount, 
                    openingBalance, 
                    advancePayment, 
                    createdAt: new Date().toLocaleString()
                };
                try {
                    const response = await fetch(`${API_URL}/parties/${partyIndex}/trips`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(trip)
                    });
                    if (response.ok) {
                        document.getElementById('add-trip-form').style.display = 'none';
                        document.getElementById('vehicle-no').value = '';
                        document.getElementById('weight').value = '';
                        document.getElementById('freight-amount').value = '';
                        document.getElementById('opening-balance').value = '';
                        document.getElementById('advance-payment').value = '';

                        displayTrips(partyIndex);
                        displayParties(); 
                    } else {
                        alert('Error saving trip');
                    }
                } catch (error) {
                    console.error('Error saving trip:', error);
                }
            } else {
                alert('Please fill in all fields.');
            }
        }

        function showAddPaymentForm(partyIndex) {
            document.getElementById('add-payment-form').style.display = 'block';
            document.getElementById('save-payment-btn').setAttribute('onclick', `savePayment(${partyIndex})`);
        }

        async function savePayment(partyIndex) {
            const amount = document.getElementById('payment-amount').value;
            if (amount) {
                const payment = { amount, date: new Date().toLocaleString() };
                try {
                    const response = await fetch(`${API_URL}/parties/${partyIndex}/payments`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payment)
                    });
                    if (response.ok) {
                        document.getElementById('add-payment-form').style.display = 'none';
                        document.getElementById('payment-amount').value = '';
                        displayParties();
                    } else {
                        alert('Error saving payment');
                    }
                } catch (error) {
                    console.error('Error saving payment:', error);
                }
            } else {
                alert('Please enter an amount.');
            }
        }

        window.onload = displayParties;

        function checkLogin() {
            if (sessionStorage.getItem('loggedIn') === 'true') {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('app-section').style.display = 'block';
                displayParties();
            }
        }

        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${API_URL}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    sessionStorage.setItem('loggedIn', 'true');
                    checkLogin();
                } else {
                    alert('Invalid credentials');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('An error occurred during login.');
            }
        }

        function logout() {
            sessionStorage.removeItem('loggedIn');
            document.getElementById('login-section').style.display = 'block';
            document.getElementById('app-section').style.display = 'none';
        }
    </script>
</body>
</html>
